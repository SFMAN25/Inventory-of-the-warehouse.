<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام جرد مخزن الكراس - إدارة علي عبداللطيف</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #1a252f;
            --secondary-color: #27ae60;
            --accent-color: #d35400;
            --text-color: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إضافة صورة الخلفية */
            background-image: linear-gradient(rgba(224, 234, 252, 0.8), rgba(224, 234, 252, 0.8)), url('https://files.catbox.moe/pe6wie.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            min-height: 100vh;
        }

        .container {
            max-width: 1050px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.92);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid var(--secondary-color);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .logo-img {
            max-width: 120px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            color: var(--primary-color);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .roles-header {
            margin-top: 10px;
            font-size: 18px;
            color: #444;
            background: #eef2f3;
            padding: 10px;
            border-radius: 50px;
            display: inline-block;
        }

        .controls-section {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 0.6fr 1.2fr;
            gap: 12px;
            margin-top: 15px;
        }

        input, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        #itemColor {
            height: 48px;
            padding: 2px;
            cursor: pointer;
            width: 100%;
        }

        .add-btn { background: var(--secondary-color); color: white; border: none; font-weight: bold; cursor: pointer; }
        .copy-btn { background: var(--primary-color); color: white; border: none; cursor: pointer; }
        .share-btn { background: #2980b9; color: white; border: none; margin-top: 20px; width: 100%; padding: 15px; font-size: 18px; cursor: pointer; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 10px;
        }

        th {
            background: var(--primary-color);
            color: white;
            padding: 15px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
            color: #333; /* لون الخط ثابت للأصناف والأرقام */
            font-weight: 600;
        }

        .delete-btn { color: #c0392b; background: none; border: none; cursor: pointer; font-size: 18px; }

        footer {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 12px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 15px;
        }

        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; z-index: 2000;
            justify-content: center; align-items: center; flex-direction: column;
        }

        @media print {
            .controls-section, .share-btn, .delete-btn, th:last-child, td:last-child { display: none !important; }
            body { background: white !important; }
            .container { box-shadow: none; border: none; width: 100%; }
        }

        @media (max-width: 768px) {
            .input-group { grid-template-columns: 1fr 1fr; }
            #itemName { grid-column: span 2; }
            .add-btn { grid-column: span 2; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <i class="fas fa-circle-notch fa-spin fa-3x"></i>
    <p>جاري استخراج صورة الجرد...</p>
</div>

<div class="container" id="printableArea">
    <header>
        <div class="header-content">
            <img src="https://files.catbox.moe/648uuj.jpg" alt="Logo" class="logo-img">
            <div>
                <h1>نظام جرد مخزن الكراس</h1>
                <div class="roles-header">
                    <i class="fas fa-user-tie"></i> أمين المخزن: <b>علي عبداللطيف</b> | 
                    <i class="fas fa-user-edit"></i> مساعد أمين المخزن: <b>عبدالرحمن محمد فوزي</b>
                </div>
            </div>
        </div>
    </header>

    <div class="controls-section">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <div><strong>تاريخ اليوم:</strong> <input type="date" id="inventoryDate"></div>
            <button class="copy-btn" onclick="copyFromYesterday()"><i class="fas fa-history"></i> نسخ أصناف أمس</button>
        </div>
        <div class="input-group">
            <input type="text" id="itemName" placeholder="أدخل اسم الصنف">
            <input type="number" id="cartons" placeholder="الكراتين">
            <input type="number" id="perCarton" placeholder="داخل الكرتونة">
            <input type="color" id="itemColor" value="#ffffff" title="اختر لون تمييز السطر">
            <button class="add-btn" onclick="addItem()">إضافة للجرد <i class="fas fa-plus-circle"></i></button>
        </div>
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>اسم الصنف</th>
                <th>الكراتين</th>
                <th>داخل الكرتونة</th>
                <th>الإجمالي</th>
                <th>حذف</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <button class="share-btn" onclick="captureReport()">
        <i class="fas fa-file-download"></i> حفظ الجرد كصورة للمشاركة
    </button>

    <footer>
        <p><b>تصميم وتطوير:</b> عبدالرحمن محمد فوزي (مساعد أمين مخزن)</p>
        <p>لطلب أنظمة برمجية خاصة بالمخازن، تواصل معي:</p>
        <a href="https://wa.me/201285577074" class="whatsapp-btn">
            <i class="fab fa-whatsapp"></i> واتساب: 01285577074
        </a>
    </footer>
</div>

<script>
    const dateInput = document.getElementById('inventoryDate');
    dateInput.value = new Date().toISOString().split('T')[0];

    let inventoryData = JSON.parse(localStorage.getItem('boda_inventory_pro')) || {};

    function renderTable() {
        const selectedDate = dateInput.value;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const items = inventoryData[selectedDate] || [];

        items.forEach((item, index) => {
            const row = document.createElement('tr');
            // تلوين خلفية السطر بالكامل بلون شفاف خفيف
            row.style.backgroundColor = item.color + "33"; 
            row.style.borderRight = `6px solid ${item.color}`;

            row.innerHTML = `
                <td>${item.name}</td>
                <td>${item.cartons}</td>
                <td>${item.perCarton}</td>
                <td>${item.cartons * item.perCarton}</td>
                <td><button class="delete-btn" onclick="deleteItem(${index})"><i class="fas fa-trash-alt"></i></button></td>
            `;
            tbody.appendChild(row);
        });
        localStorage.setItem('boda_inventory_pro', JSON.stringify(inventoryData));
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const cartons = document.getElementById('cartons').value;
        const perCarton = document.getElementById('perCarton').value;
        const color = document.getElementById('itemColor').value;
        const selectedDate = dateInput.value;

        if(!name || !cartons || !perCarton) return alert("اكمل البيانات أولاً");

        if(!inventoryData[selectedDate]) inventoryData[selectedDate] = [];
        inventoryData[selectedDate].push({ name, cartons, perCarton, color });

        document.getElementById('itemName').value = '';
        document.getElementById('cartons').value = '';
        document.getElementById('perCarton').value = '';
        renderTable();
    }

    function deleteItem(index) {
        inventoryData[dateInput.value].splice(index, 1);
        renderTable();
    }

    function copyFromYesterday() {
        const d = new Date(dateInput.value);
        d.setDate(d.getDate() - 1);
        const yesterday = d.toISOString().split('T')[0];
        if(inventoryData[yesterday]) {
            inventoryData[dateInput.value] = JSON.parse(JSON.stringify(inventoryData[yesterday]));
            renderTable();
        } else { alert("لا توجد بيانات لأمس"); }
    }

    async function captureReport() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        
        const canvas = await html2canvas(document.getElementById('printableArea'), {
            useCORS: true,
            scale: 2,
            ignoreElements: (el) => el.classList.contains('controls-section') || el.classList.contains('delete-btn') || el.classList.contains('share-btn')
        });

        const link = document.createElement('a');
        link.download = `جرد_مخزن_الكراس_${dateInput.value}.png`;
        link.href = canvas.toDataURL();
        link.click();
        overlay.style.display = 'none';
    }

    dateInput.addEventListener('change', renderTable);
    renderTable();
</script>
</body>
</html>
